# Workflow for building SolidJS site and deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  push:
    branches: ["master"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site
        run: pnpm build
        working-directory: solid-site
        env:
          BASE_PATH: ${{ github.repository == 'dumbNickname/m-tynki-beta' && '/m-tynki-beta' || '' }}

      - name: Remove CNAME for beta
        if: github.repository == 'dumbNickname/m-tynki-beta'
        run: rm -f solid-site/.output/public/CNAME

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: solid-site/.output/public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # Notify IndexNow (Bing, Yandex, Naver, Seznam) of changed URLs.
      # Production only — beta carries noindex and shouldn't be advertised.
      # Key file at public/<KEY>.txt is committed to the repo so the host
      # at https://wroclawtynki.pl/<KEY>.txt serves it for verification.
      - name: Notify IndexNow
        if: github.repository == 'dumbNickname/m-tynki' && success()
        run: |
          set -euo pipefail
          KEY="eecbb864c73e9364035d0dfb10ad23cc"
          HOST="wroclawtynki.pl"
          SITEMAP="solid-site/.output/public/sitemap.xml"
          # Extract <loc> URLs from sitemap.xml into a JSON array.
          urls=$(grep -oP '(?<=<loc>)[^<]+' "$SITEMAP" | jq -R . | jq -s .)
          payload=$(jq -n \
            --arg host "$HOST" \
            --arg key "$KEY" \
            --arg keyLoc "https://$HOST/$KEY.txt" \
            --argjson urlList "$urls" \
            '{host:$host, key:$key, keyLocation:$keyLoc, urlList:$urlList}')
          echo "Submitting $(echo "$urls" | jq length) URLs to IndexNow…"
          curl -sS -X POST https://api.indexnow.org/indexnow \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$payload" \
            -w "HTTP %{http_code}\n"
